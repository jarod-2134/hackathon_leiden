<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SokraText | AI Study Companion</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div id="dnd-overlay" class="dnd-overlay hidden">
        <div class="dnd-content">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
            <h2>Drop files to upload instantly</h2>
        </div>
    </div>

    <nav class="navbar">
        <div style="display: flex; align-items: center; gap: 1rem;">
            <a href="/static/index.html" class="nav-brand">
                <img src="/static/socrates.png" alt="SokraText" class="brand-logo">
                <span>SOKRATEXT</span>
            </a>
            <span style="color: var(--border); font-weight: 300; font-size: 1.2rem;">|</span>
        </div>
        <div class="nav-links" style="align-items: center;">
            <a href="/static/chat.html" class="nav-link">Chat</a>
            <a href="/quiz" class="nav-link">Quiz</a>
            <a href="/static/settings.html" class="nav-link">Settings</a>
            <select id="theme-selector" class="theme-select" style="margin-left: 1rem; padding: 0.25rem 0.5rem; font-size: 0.85rem; border-color: transparent; cursor: pointer; background: var(--bg-surface-hover);">
                <option value="light">Light Theme</option>
                <option value="dark">Dark Theme</option>
                <option value="ocean">Ocean Theme</option>
                <option value="forest">Forest Theme</option>
            </select>
        </div>
    </nav>

    <div class="page-container" style="position: relative;">
        <!-- Dynamic Background -->
        <div class="dynamic-bg">
            <div class="floating-shape s1"></div>
            <div class="floating-shape s2"></div>
            <div class="floating-shape s3"></div>
        </div>

        <div class="landing-content">
            <div class="logo-wrapper" style="display: flex; align-items: center; justify-content: center; gap: 1.25rem; margin-bottom: 0.5rem;">
                <img src="/static/socrates.png" alt="SokraText Logo" class="landing-logo">
                <h1 class="logo" style="margin-bottom: 0;">SOKRATEXT</h1>
            </div>
            <p class="subtitle">Your context-aware study companion.</p>
            <a href="/static/chat.html" class="btn primary-btn" style="position: relative; z-index: 2;">Enter Interface</a>
        </div>
    </div>

    <!-- Theme Initializer & DND -->
    <script src="/static/theme.js"></script>
</body>
</html>
