<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SokraText | Chat</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div id="dnd-overlay" class="dnd-overlay hidden">
        <div class="dnd-content">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
            <h2>Drop files to upload instantly</h2>
        </div>
    </div>

    <nav class="navbar">
        <div style="display: flex; align-items: center; gap: 1rem;">
            <a href="/static/index.html" class="nav-brand">SOKRATEXT</a>
            <span style="color: var(--border); font-weight: 300; font-size: 1.2rem;">|</span>
        </div>
        <div class="nav-links" style="align-items: center;">
            <a href="/static/chat.html" class="nav-link active">Chat</a>
            <a href="/quiz" class="nav-link">Quiz</a>
            <a href="/static/settings.html" class="nav-link">Settings</a>
            <select id="theme-selector" class="theme-select" style="margin-left: 1rem; padding: 0.25rem 0.5rem; font-size: 0.85rem; border-color: transparent; cursor: pointer; background: var(--bg-surface-hover);">
                <option value="light">Light Theme</option>
                <option value="dark">Dark Theme</option>
                <option value="ocean">Ocean Theme</option>
                <option value="forest">Forest Theme</option>
            </select>
        </div>
    </nav>

    <div class="page-container chat-layout" style="position: relative;">
        <!-- Dynamic Background -->
        <div class="dynamic-bg">
            <div class="floating-shape s1"></div>
            <div class="floating-shape s2"></div>
            <div class="floating-shape s3"></div>
        </div>

        <div class="sidebar" style="position: relative; z-index: 2;">
            <div class="sidebar-header" style="display: flex; justify-content: space-between; align-items: center; padding-bottom: 1rem; border-bottom: 1px solid var(--border); margin-bottom: 1rem;">
                <h2 style="margin: 0; transform: translateY(-1px);">Courses</h2>
                <button id="add-course-btn" class="icon-btn" title="Add Course" style="position: relative; z-index: 10; padding: 0.25rem;">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                </button>
            </div>
            
            <div id="readiness-widget" style="padding: 0.75rem; background: var(--bg-surface-hover); border-radius: 6px; margin-bottom: 1rem; border: 1px solid var(--border);">
                <div style="font-size: 0.8rem; color: var(--text-muted); font-weight: 600; margin-bottom: 0.25rem;">USER READINESS</div>
                <div style="display: flex; align-items: center; gap: 0.5rem;">
                    <div style="flex-grow: 1; height: 6px; background: var(--bg-base); border-radius: 3px; overflow: hidden;">
                        <div id="readiness-bar" style="width: 0%; height: 100%; background: linear-gradient(90deg, var(--accent-color), var(--accent-hover)); border-radius: 3px; transition: width 0.5s ease;"></div>
                    </div>
                    <span id="readiness-text" style="font-size: 0.9rem; font-weight: 700; color: var(--text-main);">0%</span>
                </div>
            </div>

            <div class="sidebar-content" id="doc-list-container">
                <!-- Accordions for Courses will be populated here -->
            </div>
        </div>

        <div class="main-content" style="position: relative; z-index: 2; background-color: rgba(var(--bg-base-rgb), 0.85); backdrop-filter: blur(10px);">
            <div class="chat-header" style="align-items: flex-end; padding-bottom: 0;">
                <div id="tab-container" class="tab-container">
                    <!-- Tabs will be rendered here -->
                </div>
            </div>

            <div class="chat-area" id="chat-area">
                <div class="message system-msg">
                    <div class="avatar">N</div>
                    <div class="bubble">System initialized. Upload your study materials or links to begin.</div>
                </div>
            </div>

            <div class="input-area">
                <div class="input-wrapper" style="flex-direction: column; align-items: stretch; gap: 0.5rem; background: transparent; border: none; padding: 0;">
                    <div style="display: flex; align-items: center; justify-content: flex-end;">
                        <div class="inline-toggles" style="display: flex; gap: 1rem; align-items: center;">
                            <div style="display: flex; align-items: center;">
                                <span style="font-size: 0.85rem; color: var(--text-muted); font-weight: 600; margin-right: 0.5rem;">Web Search</span>
                                <label class="switch inline-switch">
                                    <input type="checkbox" id="search-web-toggle">
                                    <span class="slider"></span>
                                </label>
                            </div>
                            <div style="display: flex; align-items: center;">
                                <span style="font-size: 0.85rem; color: var(--text-muted); font-weight: 600; margin-right: 0.5rem;">Auto-Quiz</span>
                                <label class="switch inline-switch">
                                    <input type="checkbox" id="auto-quiz-toggle">
                                    <span class="slider"></span>
                                </label>
                            </div>
                        </div>
                    </div>

                    <div style="display: flex; align-items: center; gap: 0.5rem; background: var(--bg-base); border: 1px solid var(--border); border-radius: 4px; padding: 0.5rem;">
                        <div class="menu-container" style="position: relative;">
                            <button class="icon-btn" id="menu-btn" title="Add Material">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <circle cx="12" cy="12" r="1"></circle>
                                    <circle cx="12" cy="5" r="1"></circle>
                                    <circle cx="12" cy="19" r="1"></circle>
                                </svg>
                            </button>
                            <div id="popover-menu" class="popover-menu hidden">
                                <input type="file" id="file-upload" class="hidden-input" accept=".txt,.md,.csv,.json,.pdf">
                                <button id="menu-add-file" class="menu-item">
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline></svg>
                                    Add File
                                </button>
                                <button id="menu-add-drive" class="menu-item">
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 2 22 22 22"></polygon></svg>
                                    Google Drive
                                </button>
                                <button id="menu-add-github" class="menu-item">
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"></path></svg>
                                    GitHub
                                </button>
                            </div>
                        </div>
                        <textarea id="message-input" rows="1" placeholder="Query the active context..." style="margin: 0; align-self: center;"></textarea>
                        
                        <button class="icon-btn send-btn" id="send-btn" title="Send Message">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <line x1="22" y1="2" x2="11" y2="13"></line>
                                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                            </svg>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/theme.js?v=3"></script>
    <script src="/static/chat.js?v=3"></script>
    <script src="/static/dnd.js?v=3"></script>
</body>
</html>
