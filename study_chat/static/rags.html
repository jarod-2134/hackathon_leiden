<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SokraText | Performance Network</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <style>
        .rag-dot { display: inline-block; width: 11px; height: 11px; border-radius: 50%; flex-shrink: 0; }
        .rag-red { background: #ef4444; }
        .rag-amber { background: #f59e0b; }
        .rag-green { background: #22c55e; }
        .rag-grey { background: #9ca3af; }
        .course-acc { border: 1px solid var(--border); border-radius: 6px; margin-bottom: 0.75rem; overflow: hidden; background: var(--bg-base); }
        .course-acc-header { display: flex; align-items: center; gap: 0.6rem; padding: 0.7rem 0.8rem; cursor: pointer; background: var(--bg-base); font-weight: 600; font-size: 0.9rem; }
        .course-acc-header:hover { background: var(--bg-surface-hover); }
        .course-acc-header.active-course { border-left: 3px solid var(--text-main); }
        .course-acc-body { display: none; padding: 0.4rem 0.6rem 0.6rem; }
        .course-acc-body.open { display: block; }
        .lecture-label { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.06rem; color: var(--text-muted); margin: 0.6rem 0 0.3rem; font-weight: 600; }
        .topic-row { display: flex; align-items: center; gap: 0.5rem; padding: 0.35rem 0.4rem; border-radius: 4px; cursor: pointer; font-size: 0.85rem; }
        .topic-row:hover { background: var(--bg-surface-hover); }
        .topic-row .t-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .topic-row .t-score { font-size: 0.75rem; color: var(--text-muted); font-variant-numeric: tabular-nums; }
        .legend { display: flex; gap: 1rem; flex-wrap: wrap; font-size: 0.78rem; color: var(--text-muted); }
        .legend span { display: flex; align-items: center; gap: 0.35rem; }
        .performance-main { position: relative; z-index: 2; background-color: var(--bg-base); display: flex; flex-direction: column; }
        .network-wrap { flex: 1; min-height: 0; position: relative; background: var(--bg-base); }
        #network-svg { width: 100%; height: 100%; display: block; }
        .net-node { cursor: pointer; }
        .net-node:hover circle { stroke: var(--text-main); stroke-width: 3px; }
        .analyze-panel { border-top: 1px solid var(--border); padding: 1rem 1.5rem; max-height: 32%; overflow-y: auto; }
        .analyze-panel h3 { margin: 0 0 0.3rem; font-size: 1rem; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div style="display: flex; align-items: center; gap: 1rem;">
            <a href="/static/index.html" class="nav-brand">SOKRATEXT</a>
            <span style="color: var(--border); font-weight: 300; font-size: 1.2rem;">|</span>
        </div>
        <div class="nav-links" style="align-items: center;">
            <a href="/static/chat.html" class="nav-link">Chat</a>
            <a href="/quiz" class="nav-link">Quiz</a>
            <a href="/review" class="nav-link">Review</a>
            <a href="/rags" class="nav-link active">Performance</a>
            <a href="/static/settings.html" class="nav-link">Settings</a>
            <select id="theme-selector" class="theme-select" style="margin-left: 1rem; padding: 0.25rem 0.5rem; font-size: 0.85rem; border-color: transparent; cursor: pointer; background: var(--bg-surface-hover);">
                <option value="light">Light Theme</option>
                <option value="dark">Dark Theme</option>
                <option value="ocean">Ocean Theme</option>
                <option value="forest">Forest Theme</option>
            </select>
        </div>
    </nav>

    <div class="page-container chat-layout" style="position: relative;">
        <div class="sidebar" style="position: relative; z-index: 2;">
            <div class="sidebar-header" style="padding-bottom: 1rem; border-bottom: 1px solid var(--border); margin-bottom: 1rem;">
                <h2 style="margin: 0;">Course Map</h2>
            </div>
            <div class="sidebar-content" id="course-list">
                <div style="color: var(--text-muted); font-size: 0.9rem;">Loading mastery data...</div>
            </div>
        </div>

        <div class="main-content performance-main">
            <div class="chat-header" style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 0.5rem;">
                <div id="graph-title" style="font-size: 0.9rem; color: var(--text-main); font-weight: 600;">Topic Mastery</div>
                <div class="legend">
                    <span><i class="rag-dot rag-green"></i> Strong (&ge;75%)</span>
                    <span><i class="rag-dot rag-amber"></i> Developing (50-74%)</span>
                    <span><i class="rag-dot rag-red"></i> Needs work (&lt;50%)</span>
                    <span><i class="rag-dot rag-grey"></i> Not assessed</span>
                </div>
            </div>

            <div class="network-wrap">
                <svg id="network-svg"></svg>
            </div>

            <div class="analyze-panel" id="analyze-panel">
                <h3>Topic Details</h3>
                <p style="color: var(--text-muted); font-size: 0.85rem; margin: 0;">
                    Choose a course, then select a topic to review its score, status, and latest feedback.
                </p>
            </div>
        </div>
    </div>

    <script src="/static/theme.js?v=3"></script>
    <script src="/static/rags.js?v=2"></script>
</body>
</html>
